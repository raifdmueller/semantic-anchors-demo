services:    
  db:
    image: postgres:latest
    container_name: db
    ports:
      - 15432:5432
    environment:
      - POSTGRES_USER=semantic-anchors
      - POSTGRES_PASSWORD=not-secure
      - POSTGRES_DB=semantic-anchors
      - POSTGRES_HOST_AUTH_METHOD=trust
      - PGDATA=/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semantic-anchors -d semantic-anchors"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - ./db/data/:/var/lib/postgresql/data/

  backend:
    build:
      context: ./app/
    container_name: app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - QUARKUS_DATASOURCE_USERNAME=semantic-anchors
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://db:5432/semantic-anchors
    ports:
      - "8080:8080"